<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="@stcn52/cloud-ui — React + TypeScript component library powered by Tailwind v4." />
    <title>@stcn52/cloud-ui</title>
    <script>
      // Read persisted theme/size BEFORE first paint to avoid FOUC
      (function () {
        try {
          var t = localStorage.getItem('cloud-ui-theme');
          var s = localStorage.getItem('cloud-ui-size');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;
          if (s) document.documentElement.dataset.size = s;
          else document.documentElement.dataset.size = 'normal';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
