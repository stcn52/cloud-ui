name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build library (dist/)
        run: pnpm -w build

      - name: Build Storybook (with base path)
        env:
          STORYBOOK_BASE: /cloud-ui/storybook/
        run: pnpm -w build-storybook

      - name: Build docs site
        run: pnpm --filter @stcn52/cloud-ui-site build

      - name: Merge Storybook into site output
        run: |
          mkdir -p site/dist/storybook
          cp -r storybook-static/. site/dist/storybook/

      - name: Create SPA fallback (GitHub Pages serves 404.html for unknown paths)
        run: cp site/dist/index.html site/dist/404.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
